<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Viral Radar 🎯</title>
    <style>
        :root {
            --bg-main: #0f0f14;
            --bg-card: #1a1a24;
            --accent: #ff003c;
            --text-main: #f5f5fa;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 20px 12px;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            padding: 10px 0;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        header h1 span {
            color: var(--accent);
        }

        .meta-update {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        .feed {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        .video-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .thumbnail-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
        }

        .thumbnail-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .channel-badge {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.75);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }

        .card-content {
            padding: 16px;
        }

        .video-title {
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 10px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .video-title:active {
            color: var(--accent);
        }

        .stats-row {
            display: flex;
            gap: 14px;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .stats-item span {
            color: var(--text-main);
            font-weight: 600;
        }

        .hashtags-box {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
        }

        .hashtag {
            background: rgba(255, 0, 60, 0.1);
            color: #ff4d73;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
        }

        .description-box {
            background: rgba(0, 0, 0, 0.15);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.82rem;
            color: var(--text-muted);
            line-height: 1.4;
            border-left: 3px solid var(--accent);
            margin-bottom: 14px;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-main);
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn:auto-hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: var(--accent);
        }

        .btn-primary:active {
            background: #cc0030;
        }

        /* Notification de copie temporaire */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <header>
        <h1>Viral YouTube <span>Radar</span></h1>
        <div class="meta-update" id="update-time">Chargement...</div>
    </header>

    <main class="feed" id="video-feed">
        <!-- Les cartes vidéo s'injecteront ici dynamiquement -->
    </main>

    <div class="toast" id="toast">Copié dans le presse-papiers !</div>

    <script>
        // Fonction pour copier du texte facilement sur mobile
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 2000);
            });
        }

        // Chargement des données générées par le robot Python
        fetch('./data/youtube_viral.json')

            .then(res => res.json())
            .then(data => {
                document.getElementById('update-time').innerText = `Mis à jour le : ${data.last_updated}`;
                
                const feed = document.getElementById('video-feed');
                feed.innerHTML = ''; // Nettoyage
                
                data.videos.forEach(video => {
                    const tagsHTML = video.hashtags.map(t => `<span class="hashtag">${t}</span>`).join('');
                    const tagsText = video.hashtags.join(' ');
                    
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <div class="thumbnail-wrapper">
                            <img src="${video.thumbnail}" alt="Miniature" loading="lazy">
                            <div class="channel-badge">👤 ${video.channel_title}</div>
                        </div>
                        <div class="card-content">
                            <div class="video-title" onclick="copyText('${video.title.replace(/'/g, "\\'")}')">${video.title}</div>
                            <div class="stats-row">
                                <div class="stats-item">👁️ <span>${video.views}</span></div>
                                <div class="stats-item">👍 <span>${video.likes}</span></div>
                            </div>
                            <div class="hashtags-box">
                                ${tagsHTML}
                            </div>
                            <div class="description-box">
                                ${video.description || 'Pas de description exploitable.'}
                            </div>
                            <div class="actions-grid">
                                <button class="btn" onclick="copyText('${tagsText}')">📋 Copier #Tags</button>
                                <a class="btn btn-primary" href="${video.video_url}" target="_blank">▶️ Voir la vidéo</a>
                            </div>
                        </div>
                    `;
                    feed.appendChild(card);
                });
            })
            .catch(err => {
                document.getElementById('update-time').innerText = "Erreur de synchronisation";
                console.error(err);
            });
    </script>
</body>
</html>
